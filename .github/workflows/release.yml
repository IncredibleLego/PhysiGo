name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: windows
            goos: windows
            ext: .exe
            archive: zip
          - os: linux
            goos: linux
            ext: ""
            archive: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=amd64 go build -o PhysiGo${{ matrix.ext }}

      - name: Check required folders
        run: |
          test -d config || (echo "Missing config folder" && exit 1)
          test -d examples || (echo "Missing examples folder" && exit 1)

      - name: Prepare files
        run: |
          mkdir release
          mv PhysiGo${{ matrix.ext }} release/
          cp -r config release/
          cp -r examples release/

          # (opzionale) file istruzioni
          echo "Extract and run PhysiGo" > release/README.txt

      - name: Create archive
        run: |
          cd release
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r ../PhysiGo-${{ matrix.os }}.zip .
          else
            tar -czvf ../PhysiGo-${{ matrix.os }}.tar.gz .
          fi

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PhysiGo-${{ matrix.os }}.*
          generate_release_notes: true